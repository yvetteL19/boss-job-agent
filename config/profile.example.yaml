# -----------------------------------------------------------------------------
# Greetings: first-touch openers. Human, concise, proof-led, no dashes, no
# parroting the JD, no questions. Picked by archetype/title; {role} is filled in.
# Edit `proof` and the templates to tell YOUR story.
# -----------------------------------------------------------------------------
greetings:
  intro: "你好，我是 26 届市场营销硕士"
  templates:
    - when_archetype_contains: [教育, 语言]
      when_title_contains: [教育, 语言, 学习, tutor, 课程]
      text: "{intro}，方向是教育/语言学习产品。我自己做过学习类内容和一个语言学习小工具，对学习路径设计和 AI 辅助学习有方法论。「{role}」在我深耕的方向，挺想加入。"
    - when_title_contains: [电商, 出海, 跨境, 海外]
      text: "{intro}。我有跨境内容协作和海外增长的经历，平时也用 Claude、Codex 做 AI 小工具。「{role}」结合 AI 和增长，正好用得上我的复合背景，挺想加入。"
    - when_archetype_contains: [产品运营]
      when_title_contains: [产品运营]
      text: "{intro}，方向 AI 产品运营。我擅长从真实用户反馈和数据里找问题、推动迭代，也用 Claude、Codex 做过能上线的 AI 工具原型。「{role}」挺契合，想争取一下。"
    - default: true
      text: "{intro}，方向 AI 产品/产品运营。我做过 0-1 的内容增长和用户洞察，也用 Claude Code、Codex 做过能上线的 AI 工具原型，擅长从用户出发快速做产品验证。「{role}」挺合我的，想争取一下。"
