# =============================================================================
# boss-job-agent — Candidate Profile (the ONE config that personalizes the agent)
# =============================================================================
# Copy this file to config/profile.yaml and edit it. profile.yaml is gitignored,
# so your real preferences never get committed. Everything the engine does —
# what it searches, how it scores, what it auto-rejects, how it greets — is
# driven from here. Scripts read this file; they never hardcode your preferences.
#
# Philosophy (see ARCHITECTURE.md):
#   1. Keyword rules are a SAFETY NET, not the brain. The real judgment is the
#      LLM-as-judge layer reading each JD against this profile.
#   2. Classify the role into an ARCHETYPE -> TIER first, then score within a
#      band. Never sum keywords into a score.
#   3. Discovery / scoring / drafting are automated. Sending is ALWAYS manual.
#
# The values below describe a sample persona: a junior, AI-native
# product / product-ops / user-growth candidate. Replace with your own.
# =============================================================================

identity:
  # One-line positioning the agent uses in greetings and reasoning.
  positioning: "AI 原生产品 / 产品运营 / 用户增长候选人（junior，作品集驱动）"
  # Text that appears on the page only when you are logged in to BOSS.
  # Used by the browser layer to verify the session is live. Usually your name
  # as shown in the top-right of zhipin.com. Leave "" to skip the check.
  login_name: ""

# -----------------------------------------------------------------------------
# Search: what to look for and where.
# -----------------------------------------------------------------------------
search:
  cities: [上海, 杭州]            # priority order: first = primary
  city_codes:                    # BOSS internal city codes (geek/jobs?city=)
    上海: "101020100"
    杭州: "101210100"
    北京: "101010100"
    深圳: "101280600"
    广州: "101280100"
    南京: "101190100"
    成都: "101270100"
  keywords:                      # 3-5 per batch; widen the funnel deliberately
    - 用户增长
    - 增长产品经理
    - AI 产品运营
    - AI 产品助理
    - AI 产品经理
    - AI Agent 产品
    - 教育产品 AI
  # Titles that usually mean "too senior" for a junior candidate; pre-filtered out.
  seniority_excludes: [高级, 资深, 专家, 总监, 负责人, 主管, 总裁, VP, 操盘手, 总经理]
  # On-strategy hints used to keep "unknown" archetype cards when the title is on-track.
  on_strategy_hints: [用户增长, 增长, 产品运营, AI产品, 产品经理, agent, 大模型, 教育, 语言, 出海]

# -----------------------------------------------------------------------------
# Scoring: archetype-gated band model. See agent/rules.py.
# -----------------------------------------------------------------------------
scoring:
  # Base score per tier. A = core targets, D = hard reject.
  tier_base: {A: 4.0, B: 3.5, C: 2.9, D: 2.0, unknown: 3.2}
  # Bounded evidence modifiers can nudge within a tier but never cross tiers.
  modifier_bounds: [-0.8, 0.8]
  modifiers:
    junior_friendly: 0.3        # 应届/管培/产品助理/经验不限
    visible_work_2plus: 0.25    # >=2 visible-output signals
    visible_work_1: 0.10
    ai_tool_in_practice: 0.20   # claude/codex/cursor/prompt etc.
    ops_signal: 0.10            # genuine product-ops signals (tier A/B only)
    city_primary: 0.20
    city_secondary: 0.10
    city_other: -0.40
    salary_high: 0.10
    salary_low: -0.20
  salary_high_floor_k: 15       # >= this monthly floor (K) earns salary_high
  salary_low_floor_k: 10        # < this earns salary_low
  # Confidence gates (hard caps applied last).
  no_jd_evidence_cap: 4.2       # list-card only, no JD body read yet
  low_confidence_cap: 3.4       # conflicting/insufficient classification signals

# -----------------------------------------------------------------------------
# Hard filters: deterministic auto-reject before a role reaches your review.
# -----------------------------------------------------------------------------
hard_filters:
  salary_floor_min_k: 8         # reject roles whose salary floor < this (K/month)
  experience_soft_max_years: 2  # 2y = stretch (capped, not blocked)
  experience_hard_max_years: 3  # >= this required years = blocked unless junior-track
  reject_internship_parttime: true
  reject_higher_ed_and_gov: true   # 高校/国企/央企/事业单位
  reject_early_stage: true         # 天使/种子/Pre-A/未融资 with no revenue engine
  reject_company_opacity: true     # 公司名缺失/含"某"
  reject_major_mismatch: true      # JD demands CS/AI/理工科 major exclusively

# -----------------------------------------------------------------------------
# Company quality red lines (checked at discovery via browser/cdp_company.mjs).
# -----------------------------------------------------------------------------
company_quality:
  reject_founded_this_year: true
  reject_founded_within_years: 2
  reject_micro_early: true         # 0-20人 + 未融资/天使 = no revenue engine
  work_schedule_red_terms: [单休, 大小周, 996, 997, 做六休一, 六天工作, 非工作时间, 随时待命, 随叫随到]
  call_center_terms: [呼叫中心, 电销, 客服中心, 电话营销, 话务, 外呼]
  outsource_terms: [外包, 驻场, 人力外包, 劳务派遣, 人事代理, 人力派遣]
  # Known outsourcing/staffing bodies (full-name fragments to avoid false hits).
  outsource_companies: []

# -----------------------------------------------------------------------------
